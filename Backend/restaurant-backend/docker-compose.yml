version: '3.8'

# Stack completo de infraestructura
# BD PostgreSQL corre LOCAL — los microservicios desde el IDE
# Levantar con: docker-compose up -d

services:

  # ── Message Broker ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: restaurant-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"       # http://localhost:15672  (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Cache / Rate limiting ────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: restaurant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Observabilidad ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: restaurant-prometheus
    ports:
      - "9090:9090"          # http://localhost:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      - rabbitmq

  grafana:
    image: grafana/grafana:10.4.2
    container_name: restaurant-grafana
    ports:
      - "3001:3000"          # http://localhost:3001  (admin/admin)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Calidad de código ────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10.5-community
    container_name: restaurant-sonarqube
    ports:
      - "9000:9000"          # http://localhost:9000  (admin/admin)
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://host.docker.internal:5432/db_sonar
      SONAR_JDBC_USERNAME: postgres
      SONAR_JDBC_PASSWORD: postgres
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/api/system/status"]
      interval: 60s
      timeout: 10s
      retries: 10

volumes:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

# ═══════════════════════════════════════════════════════════════════
# SETUP INICIAL (solo 1 vez)
# ═══════════════════════════════════════════════════════════════════
#
# 1. PostgreSQL local — crear bases de datos:
#    CREATE DATABASE db_auth;
#    CREATE DATABASE db_maestros;
#    CREATE DATABASE db_ventas;
#    CREATE DATABASE db_sonar;   ← para SonarQube
#
# 2. Levantar infraestructura:
#    docker-compose up -d
#
# 3. Arrancar microservicios (en este orden):
#    eureka-server   :8761  → http://localhost:8761
#    config-server   :8888
#    ms-auth         :8081
#    ms-maestros     :8082
#    ms-ventas       :8083
#    ms-notif        :8084
#    ms-reportes     :8085
#    api-gateway     :8080  → http://localhost:8080/swagger-ui.html
#
# 4. URLs de observabilidad:
#    RabbitMQ   → http://localhost:15672   (guest/guest)
#    Prometheus → http://localhost:9090
#    Grafana    → http://localhost:3001    (admin/admin)
#    SonarQube  → http://localhost:9000    (admin/admin)
#
# 5. Análisis de calidad:
#    mvn clean verify sonar:sonar \
#      -Dsonar.projectKey=restaurant-backend \
#      -Dsonar.host.url=http://localhost:9000 \
#      -Dsonar.token=TU_TOKEN_SONAR
# ═══════════════════════════════════════════════════════════════════
