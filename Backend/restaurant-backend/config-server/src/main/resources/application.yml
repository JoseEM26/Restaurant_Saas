server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        native:
          # Lee configs desde classpath/configs (modo nativo, sin Git)
          search-locations: classpath:/configs
  profiles:
    active: native

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,refresh
